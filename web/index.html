<!doctype html>
<!-- OmniDM web client — a dark-fantasy table UI for the web adapter's
     JSON-frame protocol (see src/adapters/web.ts). Plain files, no build
     step, no external origins: style.css + app.js beside this file are all
     there is. The same UI is meant to be wrapped by Capacitor later. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<!-- Defense-in-depth: players and the LLM are untrusted. Lock SCRIPTS to same-origin
     (no inline/injected code executes) and block plugins/base-tag hijacks. `connect-src`
     additionally allows the user-configured LLM endpoint used by "Play on this device"
     (any https host, or a local Ollama/LM Studio on loopback) plus ws(s) for a server
     game — a scheme allowance, NOT a baked-in external origin, and since script-src stays
     'self' it grants fetch/socket reach without opening XSS. Portraits/favicon are
     same-origin or data: images (uploaded in-app portraits resolve to a data: URL);
     `img-src https:` additionally lets a CROSS-ORIGIN game server's /portrait/… image
     load when the client is hosted apart from the server (the same scheme allowance
     connect-src grants — no baked origin, and an <img> can't execute script). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss: https: http://localhost:* http://127.0.0.1:*; object-src 'none'; base-uri 'none'; form-action 'none'">
<title>OmniDM — the table awaits</title>
<link rel="icon" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎲</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Launch screen: pick how to play (in-app engine vs a server), name + room,
     and the relevant settings. Persisted in localStorage; reopenable via the
     topbar ⚙ Settings button. (Kept id="join-screen" — showJoin() toggles it.) -->
<section id="join-screen">
  <form id="join-form" class="scroll-card launch-card">
    <h1>🎲 OmniDM</h1>
    <p class="tagline">An AI Dungeon Master awaits. Choose how to play.</p>

    <!-- Mode picker: in-app engine (this device) vs a shared server -->
    <div class="mode-picker" role="radiogroup" aria-label="How to play">
      <button type="button" id="mode-local" class="mode-choice" role="radio" aria-checked="true" data-mode="local">
        <span class="mode-title">🕯 Play on this device</span>
        <span class="mode-desc">The AI DM runs in this app with your own model. Solo or hotseat — this device only.</span>
      </button>
      <button type="button" id="mode-server" class="mode-choice" role="radio" aria-checked="false" data-mode="server">
        <span class="mode-title">🌐 Connect to a server</span>
        <span class="mode-desc">Join an OmniDM server to play multiplayer with friends across devices.</span>
      </button>
    </div>

    <label>Adventurer
      <input id="j-name" required maxlength="40" placeholder="Your name" autocomplete="username">
    </label>
    <label>Room code
      <input id="j-room" required maxlength="60" placeholder="tavern" value="tavern">
    </label>

    <!-- In-app (local) settings: the user brings their own model + key. The key is
         stored ONLY on this device and sent ONLY to the endpoint below. -->
    <fieldset id="local-settings" class="mode-fields">
      <legend>Your AI model <small>bring your own</small></legend>
      <label>Provider
        <select id="llm-provider">
          <option value="">OpenAI-compatible (OpenRouter, OpenAI, Ollama, LM Studio…)</option>
          <option value="anthropic">Anthropic (Claude, native)</option>
        </select>
      </label>
      <label>Base URL
        <input id="llm-baseurl" maxlength="200" placeholder="https://openrouter.ai/api/v1" autocomplete="off">
      </label>
      <label>API key <small>stored on this device only; sent only to the endpoint above</small>
        <input id="llm-apikey" type="password" maxlength="400" placeholder="sk-…  (leave blank for local models)" autocomplete="off">
      </label>
      <label>Model
        <input id="llm-model" maxlength="120" placeholder="meta-llama/llama-3.3-70b-instruct:free" autocomplete="off">
      </label>
    </fieldset>

    <!-- Server settings: where to connect + optional room password. -->
    <fieldset id="server-settings" class="mode-fields" hidden>
      <legend>Server</legend>
      <label>Server URL <small>blank = this site</small>
        <input id="j-server" maxlength="200" placeholder="wss://your-omnidm-server" autocomplete="off">
      </label>
      <label>Password <small>(only if the keeper set one)</small>
        <input id="j-pass" type="password" placeholder="—" autocomplete="current-password">
      </label>
    </fieldset>

    <button type="submit" class="btn-gold" id="launch-btn">Begin your adventure</button>
    <p id="join-error" class="join-error" role="alert"></p>
  </form>
</section>

<!-- The table -->
<div id="table" hidden>
  <header id="topbar">
    <h1>🎲 OmniDM</h1>
    <span id="room-label" class="room"></span>
    <span id="status" class="status"></span>
    <span id="mode-badge" class="mode-badge" title="How this table is running"></span>
    <button id="creator-btn" type="button" class="creator-btn" title="Create or edit your character">⚔ Your character</button>
    <button id="settings-btn" type="button" title="Change how you play (mode, model, server)">⚙ Settings</button>
    <button id="leave-btn" type="button" title="Leave the table">Leave</button>
  </header>
  <main>
    <section id="log" aria-live="polite" aria-label="Narration and chat"></section>
    <aside id="roster" aria-label="Party roster">
      <h2>At the table</h2>
      <div id="turn-line" class="turn-line"></div>
      <div class="board-head">
        <span class="board-title">⚔ Battle map</span>
        <button id="board-toggle" type="button" class="board-toggle" aria-expanded="true" aria-controls="board">Hide map</button>
      </div>
      <div id="board" class="board" aria-label="Token board">
        <svg id="board-svg" viewBox="0 0 100 100" preserveAspectRatio="none" role="img" aria-label="Shared token board — drag a token to move it"></svg>
      </div>
      <div id="roster-list"></div>
    </aside>
  </main>
  <footer id="composer">
    <div id="dice-tray" aria-label="Dice">
      <button type="button" class="die" data-roll="d20">d20</button>
      <button type="button" class="die" data-roll="d20 adv">adv</button>
      <button type="button" class="die" data-roll="d20 dis">dis</button>
      <input id="roll-custom" placeholder="2d6+3" maxlength="20" aria-label="Custom dice notation">
      <button type="button" class="die" id="roll-custom-btn">Roll</button>
    </div>
    <form id="say-form">
      <button type="button" id="palette-btn" title="Command menu" aria-label="Command menu">⚔</button>
      <input id="say" placeholder="What do you do?" autocomplete="off" maxlength="4000">
      <button type="submit" id="send-btn">Send</button>
    </form>
  </footer>
</div>

<!-- Command palette: every /dm command, no syntax to remember -->
<div id="palette" hidden>
  <div id="palette-sheet" role="menu" aria-label="Commands">
    <h2>⚔ Commands</h2>
    <div id="palette-list"></div>
  </div>
</div>

<!-- Character card sheet: a READ-ONLY view of another seat's portrait, name and
     card summary. Clicking YOUR OWN seat opens the editable creator instead. -->
<div id="card-sheet" hidden>
  <div id="card-sheet-inner" role="dialog" aria-modal="true" aria-label="Character card">
    <button id="card-close" type="button" aria-label="Close">✕</button>
    <div id="card-portrait" class="card-portrait" aria-hidden="true"></div>
    <h2 id="card-name" class="card-name"></h2>
    <div id="card-sub" class="card-sub"></div>
    <p id="card-desc" class="card-desc"></p>
  </div>
</div>

<!-- Character creator: the prominent, discoverable "create your character" flow
     for YOUR OWN seat. Set a name (/dm join), pick a class from a visual gallery
     of the 12 D&D 5e classes (/dm class), write a short bio (/dm bio), upload a
     portrait (POST /portrait) or import a Character Card (/dm import). A big live
     portrait preview reflects the current choices. -->
<div id="creator" hidden>
  <div id="creator-inner" role="dialog" aria-modal="true" aria-label="Create your character">
    <button id="creator-close" type="button" aria-label="Close">✕</button>
    <h2 class="creator-title">⚔ Create your character</h2>
    <div class="creator-grid">
      <div class="creator-preview">
        <div id="creator-portrait" class="card-portrait" aria-hidden="true"></div>
        <div id="creator-classname" class="creator-classname"></div>
        <div id="creator-flavor" class="creator-flavor"></div>
      </div>
      <div class="creator-fields">
        <form id="creator-name-form" class="creator-row">
          <label for="creator-name">Character name</label>
          <div class="creator-inline">
            <input id="creator-name" maxlength="40" placeholder="e.g. Thorin the Bold" autocomplete="off">
            <button type="submit" class="btn-gold creator-save">Save</button>
          </div>
          <div id="creator-name-status" class="creator-hint" role="status" aria-live="polite"></div>
        </form>
        <form id="creator-bio-form" class="creator-row">
          <label for="creator-bio">Bio <small>a short persona — optional</small></label>
          <textarea id="creator-bio" maxlength="500" rows="3" placeholder="A wandering scholar chasing a lost spellbook…"></textarea>
          <div class="creator-inline creator-inline-end">
            <span id="creator-bio-count" class="creator-hint">0 / 500</span>
            <button type="submit" class="btn-gold creator-save">Save bio</button>
          </div>
          <div id="creator-bio-status" class="creator-hint" role="status" aria-live="polite"></div>
        </form>
      </div>
    </div>

    <div class="creator-section">
      <h3>Choose your class</h3>
      <div id="card-gallery" class="card-gallery class-gallery" role="list"></div>
    </div>

    <div class="creator-section">
      <h3>Portrait <small>overrides the class art</small></h3>
      <label class="card-upload">
        <span>Upload your own image</span>
        <input id="card-file" type="file" accept="image/png,image/jpeg,image/gif,image/webp">
      </label>
      <div id="card-upload-status" class="card-upload-status" role="status" aria-live="polite"></div>
      <form id="creator-import-form" class="creator-import">
        <label for="creator-import">…or import a Character Card <small>URL or server file path</small></label>
        <div class="creator-inline">
          <input id="creator-import" maxlength="400" placeholder="https://… or data/…card.png" autocomplete="off">
          <button type="submit" class="btn-gold creator-save">Import</button>
        </div>
        <div id="creator-import-status" class="card-upload-status" role="status" aria-live="polite"></div>
      </form>
    </div>
  </div>
</div>

<!-- The in-app engine (RoomEngine + Bot + browser storage + provider), bundled
     same-origin by scripts/build-web.mjs; and the Remote/Local transport layer.
     Both load before app.js, which selects a transport from the saved settings. -->
<script src="engine.bundle.js"></script>
<script src="transport.js"></script>
<script src="portraits.js"></script>
<script src="app.js"></script>
</body>
</html>
